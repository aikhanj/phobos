name: PhobosWatchBridge
options:
  bundleIdPrefix: com.phobos
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
  createIntermediateGroups: true

settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    CODE_SIGN_STYLE: Automatic

targets:
  PhobosWatchBridge:
    type: application
    platform: iOS
    sources:
      - path: PhobosWatchBridge
        excludes:
          - "Info.plist"
    info:
      path: PhobosWatchBridge/Info.plist
      properties:
        CFBundleDisplayName: PHOBOS
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSBluetoothAlwaysUsageDescription: "Phobos broadcasts your heart rate to the game over Bluetooth."
        NSBluetoothPeripheralUsageDescription: "Phobos broadcasts your heart rate to the game over Bluetooth."
        UIBackgroundModes:
          - bluetooth-peripheral
          - bluetooth-central
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.phobos.watchbridge
        TARGETED_DEVICE_FAMILY: "1,2"
    dependencies:
      - target: PhobosWatchBridge Watch App
        embed: true
    frameworks:
      - SwiftUI
      - CoreBluetooth
      - WatchConnectivity

  PhobosWatchBridge Watch App:
    type: application
    platform: watchOS
    sources:
      - path: "PhobosWatchBridge Watch App"
        excludes:
          - "Info.plist"
    info:
      path: "PhobosWatchBridge Watch App/Info.plist"
      properties:
        CFBundleDisplayName: PHOBOS
        WKApplication: true
        WKWatchOnly: false
        WKCompanionAppBundleIdentifier: com.phobos.watchbridge
        WKBackgroundModes:
          - workout-processing
        NSHealthShareUsageDescription: "Phobos reads your heart rate to tune scares."
        NSHealthUpdateUsageDescription: "Phobos reads your heart rate to tune scares."
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.phobos.watchbridge.watchkitapp
        TARGETED_DEVICE_FAMILY: "4"
        CODE_SIGN_ENTITLEMENTS: "PhobosWatchBridge Watch App/PhobosWatchBridge.entitlements"
    frameworks:
      - SwiftUI
      - HealthKit
      - WatchConnectivity
